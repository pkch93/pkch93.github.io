projects:
  - name: "타임세일 시스템 아키텍처 설계"
    period: "2025.10 - 현재"
    description: "오퍼 생성 1,000 TPS / 조회 10,000 TPS 처리를 위한 실시간 데이터 처리 구조 설계"
    stack: "Kotlin, Spring Boot, Redis, Lua script"
    details:
      - "Redis Pipeline + Lua script 조합으로 300개 후보 가게 중 유저당 최대 30개 오퍼 실시간 생성 최적화 엔진 구현"
      - "신설 TF의 백엔드 아키텍처 전반 설계 및 구현 리딩"
  - name: "10만 TPS+ 대규모 전시 시스템 운영"
    period: "2025.01 - 2025.10"
    description: "일 2억 건 이상 적재되는 가게 전시 데이터 허브 및 대규모 트래픽 시스템 운영"
    stack: "Kotlin, Java, Apache Thrift, MySQL (Sharding)"
    details:
      - "Apache Thrift RPC 기반 서버 및 애플리케이션 레벨 DB 샤딩 구조 운영"
      - "대규모 트래픽 환경에서의 시스템 안정성 유지 및 전시 데이터 정합성 보장"
  - name: "한그릇할인 메뉴 노출 감지 데몬 서버"
    period: "2025.03 - 2025.04"
    description: "메뉴별 노출 가능 여부와 할인 적용 시간을 실시간으로 판단하는 데몬 서버"
    stack: "Kotlin, Spring Boot, Multi-threading"
    details:
      - "5분 주기 폴링 및 다중 스레드 병렬 처리 구조 설계로 복잡한 할인 조건 판단 로직 구현"
      - "성능 테스트를 통한 최적 스레드 수 도출로 시스템 부하 최소화 및 안정적 오픈"
  - name: "배민우리동네 백엔드 시스템 설계·운영"
    period: "2023.05 - 2024.12"
    description: "하이퍼로컬 서비스의 백엔드 초기 설계 및 검색 기능 구현"
    stack: "Kotlin, Spring Boot, Amazon OpenSearch"
    details:
      - "반경 기반 노출 필터링을 위해 Amazon OpenSearch 도입 및 데이터 모델링/쿼리 직접 설계"
      - "테스트 커버리지 90% 이상 유지 및 단골 추천 기능 개발 리딩"
  - name: "프로모션 플랫폼 신규 구축"
    period: "2022.03 - 2022.05"
    description: "반복적인 이벤트를 추상화한 재사용 가능 플랫폼 설계·구현"
    stack: "Kotlin, Spring Webflux"
    details:
      - "기존의 파편화된 이벤트를 '조건 - 참여 - 보상' 구조로 추상화하여 확장성 확보"
      - "Spring Webflux 도입으로 급증하는 트래픽 처리 성능을 대폭 개선"

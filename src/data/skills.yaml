skills:
  - category: "Core"
    description: "소스코드를 보지 않고도 원리와 내부 구조를 설명할 수 있으며, 트러블슈팅 경험이 풍부한 주력 기술."
    items:
      - name: "Kotlin"
        comment: "가장 숙련된 언어로 코루틴 등을 활용한 비동기 프로그래밍에 능숙합니다."
      - name: "Java"
        comment: "JVM의 동작 원리와 가비지 컬렉션 구조를 이해하고 있습니다."
      - name: "Spring Boot"
        comment: "다양한 스타터를 활용하여 생산성 높은 서버를 구축할 수 있습니다."
      - name: "Spring Webflux"
        comment: "Non-blocking I/O 기반의 리액티브 시스템 구축 경험이 있습니다."
      - name: "Spring Batch"
        comment: "대용량 데이터 처리를 위한 배치 아키텍처 설계가 가능합니다."
      - name: "MySQL"
        comment: "성능 최적화를 위한 인덱싱 및 쿼리 튜닝 경험이 많습니다."
  - category: "Experienced"
    description: "실무에서 프로덕션 레벨로 사용해 보았고, 주어진 요구사항을 구현하고 기본적인 문제를 해결할 수 있는 기술"
    items:
      - name: "Redis"
        comment: "분산 락, 캐싱 전략 등을 실무에 적용해 보았습니다."
      - name: "Amazon DynamoDB"
        comment: "NoSQL의 특성에 맞는 데이터 모델링 및 사용 경험이 있습니다."
      - name: "Kafka"
        comment: "메시지 큐를 활용한 이벤트 기반 아키텍처 구축 경험이 있습니다."
      - name: "JUnit"
        comment: "테스트 주도 개발(TDD)을 선호하며 높은 테스트 커버리지를 유지합니다."
      - name: "Testcontainers"
        comment: "통합 테스트 환경에서 인프라를 컨테이너로 격리하여 테스트합니다."
  - category: "Familiar"
    description: "과거에 사용해 보았거나, 사이드 프로젝트 등에서 가볍게 다뤄본 기술."
    items:
      - name: "OpenSearch"
        comment: "로그 분석 및 검색 엔진 구축에 활용해 본 경험이 있습니다."
      - name: "Amazon SQS"
        comment: "메시지 드리븐 방식의 서비스 연동에 사용해 보았습니다."
      - name: "Apache Thrift (RPC)"
        comment: "IDL 기반의 효율적인 통신 프로토콜 설계 경험이 있습니다."

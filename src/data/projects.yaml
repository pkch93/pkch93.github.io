projects:
  - name: "타임세일 시스템 구축"
    period: "2025.10 - 2026.03"
    description: "한정된 할인 인원을 골고루 노출하기 위한 페이싱 구조 설계 및 n개 가게를 유저에게 할당하기 위한 타임세일 시스템 구축"
    stack: "Kotlin, Spring Boot, Redis, MySQL, Kafka"
    details:
      - "50,000 TPS 이상의 트래픽에서 안정적으로 타임세일을 제공할 수 있는 시스템 구축"
      - "동시성 이슈를 제어하고 응답 속도를 극대화하기 위해 Redis Pipeline과 Lua Script를 도입하여, 실시간 할인 가게 선별 로직의 성능을 최적화"
      - "타임세일 백엔드 아키텍처 전반 설계 및 구현"
  - name: "10만 TPS+ 대규모 전시 데이터 허브 시스템 운영"
    period: "2025.01 - 2025.10"
    description: "일 2억 건 이상 적재되는 가게 전시 데이터 허브 및 대규모 트래픽 시스템 운영"
    stack: "Java, Spring Boot, Apache Thrift, MySQL, Redis, Kafka"
    details:
      - "Apache Thrift RPC 기반 서버 및 애플리케이션 레벨 DB 샤딩 구조 운영"
      - "대규모 트래픽 환경에서의 시스템 안정성 유지 및 전시 데이터 정합성 보장"
  - name: "한그릇할인 메뉴 노출 감지 데몬 서버"
    period: "2025.03 - 2025.04"
    description: "메뉴별 노출 가능 여부와 할인 적용 시간을 실시간으로 판단하는 데몬 서버"
    stack: "Java, Spring Boot, Spring Scheduling"
    details:
      - "폴링 및 다중 스레드 병렬 처리 구조 설계로 복잡한 할인 조건 판단 로직 구현"
      - "사전 성능 테스트를 통해 최적의 스레드 풀 사이즈를 도출하고 병목 지점을 개선하여, 시스템 부하를 최소화한 상태로 안정적인 서비스 오픈 달성"
  - name: "배민우리동네 백엔드 시스템 설계·운영"
    period: "2023.05 - 2024.12"
    description: "하이퍼로컬 서비스의 백엔드 초기 설계 및 검색 기능 구현"
    stack: "Kotlin, Spring Boot, MySQL, Amazon OpenSearch"
    details:
      - "반경 기반 노출 필터링을 위해 Amazon OpenSearch 도입 및 데이터 모델링/쿼리 직접 설계"
      - "TDD 환경을 구축하여 테스트 커버리지 90% 이상을 유지하며 리팩토링 안정성 확보"
      - "단골 추천 기능 개발 리딩"
  - name: "프로모션 플랫폼 신규 구축"
    period: "2022.03 - 2022.05"
    description: "반복적인 이벤트를 추상화한 재사용 가능 플랫폼 설계·구현"
    stack: "Java, Spring Webflux, Redis, MySQL, Amazon SQS"
    details:
      - "기존의 파편화된 이벤트를 '조건 - 참여 - 보상' 구조로 추상화하여 확장성 확보"
      - "Spring Webflux 도입으로 급증하는 트래픽 처리량 최소 5배 개선하여 장애건수 0건 달성"

skills:
  - category: "Core"
    description: "기술의 원리를 설명할 수 있으며, 트러블슈팅 경험이 풍부한 주력 기술"
    items:
      - name: "Kotlin"
        comment: "가장 숙련된 언어로, 코루틴을 활용한 비동기 프로그래밍 및 간결한 코드 구조화에 능숙합니다."
      - name: "Java"
        comment: "기본적인 프로그래밍 언어로 활용하며, Collections API, 비동기 처리 API, JVM의 동작 원리를 이해하고 사용합니다."
      - name: "Spring Boot"
        comment: "오토 설정과 다양한 스타터를 활용하여 생산성 높고 안정적인 서버를 빠르게 구축할 수 있습니다."
      - name: "Spring Web"
        comment: "Spring WebMVC와 WebFlux를 활용하여 트래픽 특성에 맞는 견고한 RESTful API를 개발합니다."
      - name: "Spring Data JPA"
        comment: "객체 지향적인 도메인 모델링이 가능하며, N+1 문제 등 성능 이슈를 고려해 ORM을 활용합니다."
      - name: "Spring Batch"
        comment: "대용량 데이터의 안정적인 처리와 청크 기반 배치 프로세스 최적화에 익숙합니다."
      - name: "MySQL"
        comment: "실행 계획 분석을 통한 쿼리 튜닝과 서비스 요구사항에 최적화된 인덱스 설계 경험이 가능합니다."
      - name: "Redis"
        comment: "응답 속도 개선을 위한 캐싱 전략 수립과 데이터 정합성을 위한 분산락 처리에 적극 활용할 수 있습니다."
      - name: "Kafka"
        comment: "이벤트 기반 아키텍처를 위한 비동기 메시징 처리 및 시스템 간 결합도 완화에 활용합니다."
      - name: "JUnit"
        comment: "비즈니스 로직 검증을 위한 단위 테스트 및 BDD 스타일의 가독성 높은 테스트 작성에 익숙합니다."
      - name: "Testcontainers"
        comment: "Docker 컨테이너를 활용하여 프로덕션과 유사한 격리된 통합 테스트 환경을 구축할 수 있습니다."
  - category: "Experienced"
    description: "실무에서 프로덕션 레벨로 사용해 보았고, 주어진 요구사항을 구현할 수 있는 기술"
    items:
      - name: "Spring Security"
        comment: "Spring Security를 활용해 보안 정책을 애플리케이션에 적용할 수 있습니다."
      - name: "OpenSearch"
        comment: "데이터 기반의 전문 검색 기능 구현에 활용해 보았습니다."
      - name: "Amazon DynamoDB"
        comment: "애플리케이션의 데이터 접근 패턴을 고려한 NoSQL 테이블 설계와 파티셔닝 전략 수립 경험이 있습니다."
      - name: "Amazon SQS"
        comment: "비동기 작업 큐 처리 및 마이크로서비스 간의 안정적인 메시지 기반 연동에 활용해 보았습니다."
  - category: "Familiar"
    description: "과거에 사용해 보았거나, 사이드 프로젝트 등에서 다뤄본 기술"
    items:
      - name: "Apache Thrift (RPC)"
        comment: "IDL 기반의 효율적인 통신 프로토콜을 다뤄보았습니다."
      - name: "TypeScript"
        comment: "정적 타입 시스템을 도입하여 런타임 에러를 방지하고 유지보수하기 좋은 프론트엔드 로직을 작성할 수 있습니다."
      - name: "React"
        comment: "컴포넌트 기반 UI 설계와 상태 관리를 활용해 사내 어드민 프로젝트나 사이드 프로젝트를 개발해 보았습니다."
